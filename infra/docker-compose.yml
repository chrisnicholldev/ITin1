name: itdesk

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-itdesk_root_default}
      MONGO_INITDB_DATABASE: itdesk
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:-itdesk_app_default}
    volumes:
      - mongo_data:/data/db
      - ./mongo/init-mongo.js:/docker-entrypoint-initdb.d/01-init.js:ro
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      CLIENT_URL: ${CLIENT_URL:-}
      MONGODB_URI: mongodb://itdesk_user:${MONGO_APP_PASSWORD:-itdesk_app_default}@mongo:27017/itdesk
      REDIS_URL: redis://redis:6379
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      LDAP_ENABLED: ${LDAP_ENABLED:-false}
      LDAP_URL: ${LDAP_URL:-}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      LDAP_BIND_CREDENTIALS: ${LDAP_BIND_CREDENTIALS:-}
      LDAP_SEARCH_BASE: ${LDAP_SEARCH_BASE:-}
      LDAP_SEARCH_FILTER: ${LDAP_SEARCH_FILTER:-(sAMAccountName={{username}})}
      LDAP_ADMIN_GROUP: ${LDAP_ADMIN_GROUP:-}
      LDAP_TECH_GROUP: ${LDAP_TECH_GROUP:-}
      LDAP_USER_GROUP: ${LDAP_USER_GROUP:-}
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      INTUNE_ENABLED: ${INTUNE_ENABLED:-false}
      INTUNE_TENANT_ID: ${INTUNE_TENANT_ID:-}
      INTUNE_CLIENT_ID: ${INTUNE_CLIENT_ID:-}
      INTUNE_CLIENT_SECRET: ${INTUNE_CLIENT_SECRET:-}
      INTUNE_SYNC_SCHEDULE: ${INTUNE_SYNC_SCHEDULE:-}
      MERAKI_ENABLED: ${MERAKI_ENABLED:-false}
      MERAKI_API_KEY: ${MERAKI_API_KEY:-}
      MERAKI_ORG_ID: ${MERAKI_ORG_ID:-}
      MERAKI_SYNC_SCHEDULE: ${MERAKI_SYNC_SCHEDULE:-}
      VAULT_ENCRYPTION_KEY: ${VAULT_ENCRYPTION_KEY:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-25}
    volumes:
      - uploads:/app/uploads
      - app_data:/app/data
    depends_on:
      - mongo
      - redis
    networks:
      - internal

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api
      - web
    networks:
      - internal

volumes:
  mongo_data:
  redis_data:
  uploads:
  app_data:

networks:
  internal:
    driver: bridge
