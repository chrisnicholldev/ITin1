name: Bug report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.
        **Do not report security vulnerabilities here** — email security@chrisnicholl.com instead.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I click X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What should have happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ITin1 version
      placeholder: e.g. v1.0.2 (check the footer or git tag)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Server OS
      placeholder: e.g. Ubuntu 24.04 LTS
    validations:
      required: true

  - type: input
    id: docker
    attributes:
      label: Docker version
      placeholder: e.g. Docker 26.1.4, Compose 2.27.1
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant output from `docker compose logs api` or browser console.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help — screenshots, config snippets (remove secrets), etc.
    validations:
      required: false
